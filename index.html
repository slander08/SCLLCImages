<!DOCTYPE html>
<html>
<head>
    <title>WCA JSON Uploader</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>WCA JSON Uploader</h1>

<input type="password" id="token" placeholder="GitHub Personal Access Token">

<input type="text" id="owner" placeholder="GitHub Username">

<input type="text" id="repo" placeholder="Repository Name">

<input type="text" id="wcaid" placeholder="WCAID">

<input type="text" id="fact1" placeholder="Fact 1">

<input type="text" id="fact2" placeholder="Fact 2">

<input type="text" id="fact3" placeholder="Fact 3">

<input type="text" id="fact4" placeholder="Fact 4">

<button onclick="uploadJSON()">Update people.json</button>

<p id="status"></p>

<script>

async function uploadJSON() {

    const token = document.getElementById("token").value.trim();
    const owner = document.getElementById("owner").value.trim();
    const repo = document.getElementById("repo").value.trim();
    const wcaid = document.getElementById("wcaid").value.trim();

    const facts = [
        document.getElementById("fact1").value.trim(),
        document.getElementById("fact2").value.trim(),
        document.getElementById("fact3").value.trim(),
        document.getElementById("fact4").value.trim()
    ].filter(f => f !== "");

    if (!wcaid) {
        status.innerText = "Please enter a WCAID.";
        return;
    }

    const path = "data/people.json";

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    let existingData = {};
    let sha = null;

    // Try loading existing JSON
    const getResponse = await fetch(url, {
        headers: {
            "Authorization": `token ${token}`
        }
    });

    if (getResponse.ok) {

        const fileData = await getResponse.json();

        sha = fileData.sha;

        const decodedContent = atob(fileData.content.replace(/\n/g, ""));

        existingData = JSON.parse(decodedContent);
    }

    // Add or update WCAID
    existingData[wcaid] = facts;

    const updatedJSON = JSON.stringify(existingData, null, 4);

    const uploadResponse = await fetch(url, {
        method: "PUT",

        headers: {
            "Authorization": `token ${token}`,
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: `Update people.json`,
            content: btoa(updatedJSON),
            sha: sha
        })
    });

    const result = await uploadResponse.json();

    if (uploadResponse.ok) {

        status.innerText = "people.json updated successfully!";

    } else {

        status.innerText = "Error: " + result.message;
    }
}

</script>

</body>
</html>
