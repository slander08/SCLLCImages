<!DOCTYPE html>
<html>
<head>
    <title>WCA JSON Uploader</title>

    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>WCA JSON Uploader</h1>

<input type="password" id="token" placeholder="GitHub Personal Access Token">

<input type="text" id="owner" placeholder="GitHub Username">

<input type="text" id="repo" placeholder="Repository Name">

<input type="text" id="wcaid" placeholder="WCAID">

<input type="text" id="fact1" placeholder="Fact 1">

<input type="text" id="fact2" placeholder="Fact 2">

<input type="text" id="fact3" placeholder="Fact 3">

<input type="text" id="fact4" placeholder="Fact 4">

<button onclick="uploadJSON()">Update people.json</button>

<p id="status"></p>

<p id="uploaded"></p>

<script>

async function uploadJSON() {

    const token = document.getElementById("token").value.trim();
    const owner = document.getElementById("owner").value.trim();
    const repo = document.getElementById("repo").value.trim();
    const wcaid = document.getElementById("wcaid").value.trim();

    const facts = [
        fact1.value,
        fact2.value,
        fact3.value,
        fact4.value
    ].filter(f => f.trim() !== "");

    const path = "data/people.json";
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    let sha = null;
    let existingData = {};

    // ALWAYS fetch latest file first
    const res = await fetch(url, {
        headers: {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github+json"
        }
    });

    if (res.ok) {
        const file = await res.json();

        sha = file.sha;

        const decoded = atob(file.content.replace(/\n/g, ""));

        try {
            existingData = JSON.parse(decoded);
        } catch (e) {
            existingData = {};
        }
    }

    // update data
    existingData[wcaid] = facts;

    const updated = JSON.stringify(existingData, null, 4);

    const uploadRes = await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify({
            message: `update people.json`,
            content: btoa(updated),
            sha: sha // IMPORTANT
        })
    });

    const result = await uploadRes.json();

    if (!uploadRes.ok) {
        console.log(result);
        status.innerText = "Upload failed: " + result.message;
        return;
    }

    status.innerHTML = "✅ Updated successfully";
}

</script>

</body>
</html>
