<!DOCTYPE html>
<html>
<head>
    <title>JSON Uploader</title>
    <style>
        body {
            font-family: Arial;
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Upload JSON to GitHub</h1>

<input type="text" id="token" placeholder="GitHub Personal Access Token">

<input type="text" id="owner" placeholder="GitHub Username">
<input type="text" id="repo" placeholder="Repository Name">

<input type="text" id="personId" placeholder="Person ID">

<input type="text" id="fact1" placeholder="Fact 1">
<input type="text" id="fact2" placeholder="Fact 2">
<input type="text" id="fact3" placeholder="Fact 3">
<input type="text" id="fact4" placeholder="Fact 4">
<input type="text" id="fact5" placeholder="Fact 5">

<button onclick="uploadJSON()">Upload JSON</button>

<p id="status"></p>

<script>
async function uploadJSON() {

    const token = document.getElementById("token").value;
    const owner = document.getElementById("owner").value;
    const repo = document.getElementById("repo").value;
    const id = document.getElementById("personId").value;

    const facts = [
        fact1.value,
        fact2.value,
        fact3.value,
        fact4.value,
        fact5.value
    ].filter(f => f.trim() !== "");

    const data = {
        id: id,
        facts: facts
    };

    const jsonContent = JSON.stringify(data, null, 4);

    const content = btoa(jsonContent);

    const path = `data/${id}.json`;

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    const response = await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": `token ${token}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: `Add ${id}.json`,
            content: content
        })
    });

    const result = await response.json();

    if (response.ok) {
        status.innerText = "Uploaded successfully!";
    } else {
        status.innerText = "Error: " + result.message;
    }
}
</script>

</body>
</html>
